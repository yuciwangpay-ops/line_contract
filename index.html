<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建立靈魂小怪獸群組</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 mt-4">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">🛡️ 建立冒險小組</h2>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="groupName">
                為你們的小組取個響亮的名字吧！
            </label>
            <input class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-green-400" id="groupName" type="text" placeholder="例如：晨型人俱樂部、期末生存營">
        </div>

        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="habitGoal">
                你自己的專屬習慣目標是？
            </label>
            <input class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-green-400" id="habitGoal" type="text" placeholder="例如：每天喝水2000cc、背20個單字">
        </div>

        <button id="submitBtn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded w-full shadow-lg transition duration-200" onclick="submitForm()">
            ⚔️ 宣告目標，建立小組！
        </button>
    </div>

    <script>
        // 🔑 啟動 LIFF 應用程式 (請把下方替換成你剛剛拿到的 LIFF ID)
        const myLiffId = "2008852230-BdH1Y5Fl";

        // 初始化 LIFF
        liff.init({ liffId: myLiffId })
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            })
            .catch((err) => {
                console.error("LIFF 初始化失敗", err);
            });

        // 玩家按下按鈕後執行的功能
        function submitForm() {
            const groupName = document.getElementById('groupName').value;
            const habitGoal = document.getElementById('habitGoal').value;

            // 簡單防呆：確保玩家有填寫資料
            if(groupName === "" || habitGoal === "") {
                alert("勇者，請填寫完整的小組名稱與目標！");
                return;
            }

            // 組合給機器人看的神奇指令
            const commandText = "#開團 " + groupName + " | " + habitGoal;

            // 讓 LIFF 代替玩家在聊天室送出訊息
            liff.sendMessages([
                {
                    type: 'text',
                    text: commandText
                }
            ]).then(() => {
                // 訊息送出後，自動關閉 LIFF 網頁，回到 LINE 聊天室
                liff.closeWindow();
            }).catch((err) => {
                console.error("發送訊息失敗", err);
                alert("發生錯誤，請稍後再試！");
            });
        }
    </script>
</body>
</html>
